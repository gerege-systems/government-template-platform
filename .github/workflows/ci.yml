# Pre-flight CI gates — run on every push to main and every PR, BEFORE deploy.
# Mirrors `make -C backend pre-push` (see CLAUDE.md "CI gates"): gofmt, go vet,
# golangci-lint, swagger drift, race tests, binary build, frontend lint+build,
# and a gitleaks secrets scan.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'backend/docs/**'
      - '**/*.md'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

# One CI run per ref; newer pushes cancel stale in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend · gofmt/vet/lint/swag/test/build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - name: gofmt (must be empty)
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then echo "gofmt needed:"; echo "$files"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        run: make ci-lint
      - name: swagger drift
        run: make ci-swag-check
      - name: unit tests (race + coverage)
        run: make ci-test
      - name: build api binary
        run: make ci-build

  frontend:
    name: frontend · lint/build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (scan working tree)
        run: |
          set -euo pipefail
          ver="$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                 | grep -oE '"tag_name": *"v[^"]+"' | head -1 | grep -oE 'v[0-9.]+' | sed 's/^v//')"
          echo "gitleaks v$ver"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --redact --no-banner
