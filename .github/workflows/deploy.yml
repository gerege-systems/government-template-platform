# Continuous deployment — push to main rebuilds and restarts the compose stack
# on the production VPS. The remote step runs deploy/deploy.sh after the target
# commit is checked out. Secrets: DEPLOY_HOST / DEPLOY_USER / DEPLOY_PORT /
# DEPLOY_PATH / DEPLOY_SSH_KEY (dedicated non-root `deploy` user, key-only).
name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'backend/docs/**'
      - 'mkdocs.yml'
      - '**/*.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}

# Never run two production deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PORT: ${{ secrets.DEPLOY_PORT }}
          DPATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${PORT:-22}" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -p "${PORT:-22}" -o IdentitiesOnly=yes \
            "$USER@$HOST" \
            "set -euo pipefail; \
             cd '${DPATH:-/srv/template}'; \
             echo '▶ Fetching origin/main…'; \
             git fetch --prune origin; \
             git reset --hard origin/main; \
             echo \"▶ Now at: \$(git rev-parse --short HEAD) — \$(git log -1 --pretty=%s)\"; \
             bash deploy/deploy.sh"
